<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="watchGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1" />
    </radialGradient>
  </defs>
  <rect x="30" y="20" width="140" height="160" rx="20" fill="url(#watchGradient)" stroke="#333" stroke-width="2"/>
  <circle cx="100" cy="90" r="50" fill="#000" opacity="0.3"/>
  <circle cx="100" cy="90" r="45" fill="#1a1a1a" stroke="#666" stroke-width="2"/>
  <circle cx="100" cy="90" r="40" fill="#333"/>
  <!-- Hour hand -->
  <line x1="100" y1="90" x2="100" y2="60" stroke="#ddd" stroke-width="4" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="100" y1="90" x2="100" y2="45" stroke="#ddd" stroke-width="3" stroke-linecap="round" transform="rotate(45 100 90)"/>
  <!-- Center dot -->
  <circle cx="100" cy="90" r="4" fill="#ddd"/>
  <text x="100" y="175" font-size="16" text-anchor="middle" fill="#333" font-weight="bold">LUXURY WATCH</text>
</svg>