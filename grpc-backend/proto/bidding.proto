syntax = "proto3";
package bidding;

service BiddingService {
  rpc LiveBidding(stream BidRequest) returns (stream BidUpdate);
  rpc StreamBids(stream BidRequest) returns (BidResponse);
  rpc SendUpdate(SendUpdateRequest) returns (stream BidUpdate);
  rpc PlaceBid(BidRequest) returns (BidResponse);
  rpc GetAuctionResult(AuctionResultRequest) returns (AuctionResultResponse);
  rpc GetLeaderboard(GetLeaderboardRequest) returns (GetLeaderboardResponse);
  rpc CreateAuctionRoom(CreateAuctionRoomRequest) returns (CreateAuctionRoomResponse);
  rpc CloseAuctionRoom(CloseAuctionRoomRequest) returns (CloseAuctionRoomResponse);
}

message BidRequest {
  string auction_id = 1;
  string bidder_id = 2;
  string bidder_name = 3;
  double amount = 4;
  string token = 5;
}

message BidUpdate {
  string auction_id = 1;
  string highest_bidder = 2;
  double highest_amount = 3;
  int64 timestamp = 4;
  int32 remaining_seconds = 5;
  string event_type = 6;
}

message BidResponse {
  bool success = 1;
  string message = 2;
  double current_highest = 3;
}

message SendUpdateRequest {
  string auction_id = 1;
  string token = 2;
}

message AuctionResultRequest {
  string auction_id = 1;
}

message AuctionResultResponse {
  string auction_id = 1;
  string winner = 2;
  double final_price = 3;
  bool auction_closed = 4;
}

message GetLeaderboardRequest {
  string auction_id = 1;
  int32 limit = 2;
}

message LeaderboardEntry {
  string bidder_name = 1;
  double highest_bid = 2;
  int32 rank = 3;
}

message GetLeaderboardResponse {
  string auction_id = 1;
  repeated LeaderboardEntry entries = 2;
}

message CreateAuctionRoomRequest {
  string auction_id = 1;
  double starting_price = 2;
  int32 duration_seconds = 3;
}

message CreateAuctionRoomResponse {
  bool success = 1;
  string message = 2;
}

message CloseAuctionRoomRequest {
  string auction_id = 1;
}

message CloseAuctionRoomResponse {
  bool success = 1;
  string message = 2;
}
